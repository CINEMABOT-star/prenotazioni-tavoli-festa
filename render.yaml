services:
  - type: web
    name: prenotazioni-tavoli-festa
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: reservations-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 24.18.0
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
